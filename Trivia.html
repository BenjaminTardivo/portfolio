<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<body>
    <script>
        var Preguntas = [
          {
            Pregunta: "De que color es el cielo??\n(a) Rojo\n\ (b) celeste\n(c) Naranja",
                answer: "b"
          },
          {
            Pregunta: "quien descubiro America?\n(a) Napoleon\n\ (b) San Martin\n(c) Colon",
               answer: "c"
          },
          {
            Pregunta: "Quien es su alumno favorito?\n(a) Benjamin Tardivo\n\ (b) Otro\n(c) No tengo",
               answer: "a"
          },
          {
            Pregunta: "De que color es el caballo blanco de San Martin?\n(a) Blanco \n\ (b) Marron\n(c) Negro",
            answer: "a"
          },
          {
            Pregunta: "Cuanto es 2+2\n(a) 4\n\ (b) 8\n(c) Pez",
            answer: "a"
        }
        ];
        var puntaje = 0;
        
        for(var i = 0; i < Preguntas.length; i++){
          var response = window.prompt(Preguntas[i].Pregunta);
          if(response == Preguntas[i].answer){
            puntaje++;
               alert("Correcto!");
          } else {
               alert("MAL!");
          }
        }
        alert("Sacaste " + puntaje + "/" + Preguntas.length);</script>
